# 避免 localized sitemap route 落回 Nuxt app shell
[[redirects]]
from = "/zh/sitemap.xml"
to = "/sitemap_index.xml"
status = 308
force = true

# 修正異常語系組合 /zh/en/* 轉址到正確路徑
[[redirects]]
from = "/zh/en/*"
to = "/zh/:splat"
status = 308
force = true

# 修正異常語系組合 /en/zh/* 轉址到正確路徑
[[redirects]]
from = "/en/zh/*"
to = "/en/:splat"
status = 308
force = true

# 修正異常語系組合 /zh/zh/* 轉址到正確路徑
[[redirects]]
from = "/zh/zh/*"
to = "/zh/:splat"
status = 308
force = true

# 修正異常語系組合 /en/en/* 轉址到正確路徑
[[redirects]]
from = "/en/en/*"
to = "/en/:splat"
status = 308
force = true

# 將 /en/ 永久重定向到根目錄 (/)
[[redirects]]
from = "/en/*"
to = "/:splat" # 將 /en/foo 重定向到 /foo, /en/ 重定向到 /
status = 308
force = true

# Nuxt SSR 入口：將所有請求導到 Nitro 產生的 Netlify Functions
[functions]
directory = ".netlify/functions-internal"
