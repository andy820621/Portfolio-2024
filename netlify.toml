[build]
command = "NODE_ENV=production SENTRY_RELEASE=${COMMIT_REF:-${SENTRY_RELEASE:-local-build}} NODE_OPTIONS='--max-old-space-size=3072' pnpm run build"

[build.environment]
NODE_VERSION = "22.22.1"
PNPM_FLAGS = "--shamefully-hoist"
# AWS Lambda requires specific GLIBC version - ensure proper rebuild
AWS_LAMBDA_JS_RUNTIME = "nodejs22.x"

[images]
# Allow Netlify Image CDN to fetch and transform external images
# used by Nuxt Image in production. Add any other remote sources here.
remote_images = [ "https://*/*" ]

# HTTP 到 HTTPS 的重定向
[[redirects]]
from = "http://barz.app/*"
to = "https://barz.app/:splat"
status = 308
force = true

# 避免 http://www.barz.app/zh 產生額外一跳（http -> https -> trailing slash）
[[redirects]]
from = "http://www.barz.app/zh"
to = "https://barz.app/zh/"
status = 308
force = true

[[redirects]]
from = "http://www.barz.app/*"
to = "https://barz.app/:splat"
status = 308
force = true

# 避免 https://www.barz.app/zh 產生額外一跳（www -> non-www -> trailing slash）
[[redirects]]
from = "https://www.barz.app/zh"
to = "https://barz.app/zh/"
status = 308
force = true

# 移除 www 子網域
[[redirects]]
from = "https://www.barz.app/*"
to = "https://barz.app/:splat"
status = 308
force = true

# 在請求進入 Nuxt SSR／i18n 前，直接結束常見敏感路徑掃描
[[redirects]]
from = "/.env"
to = "/404.html"
status = 404
force = true

[[redirects]]
from = "/.git/*"
to = "/404.html"
status = 404
force = true

[[redirects]]
from = "/wp-login.php"
to = "/404.html"
status = 404
force = true

[[redirects]]
from = "/wp-admin/*"
to = "/404.html"
status = 404
force = true

[[redirects]]
from = "/wp-config.php"
to = "/404.html"
status = 404
force = true

[[redirects]]
from = "/xmlrpc.php"
to = "/404.html"
status = 404
force = true

# 舊文章路徑重新導向到目前最接近的 Nuxt Content 架構文章
[[redirects]]
from = "/posts/fetch-content-data-render-pages/"
to = "/posts/nuxt-content-v3-i18n-bilingual-site/"
status = 301
force = true

